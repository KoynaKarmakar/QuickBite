<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">QuickBite</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/customers">Customers</a>
            <a class="btn btn-outline-light me-2" href="/menu">Menu</a>
            <a class="btn btn-warning" href="/orders">Orders</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">🍽️ Menu</h2>

    <!-- Add Item -->
    <div class="card shadow-sm p-4 mb-5">
        <h4>Add Food Item</h4>

        <form th:action="@{/menu}" method="post">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" name="name" class="form-control" placeholder="Item Name" required>
                </div>
                <div class="col-md-5">
                    <input type="number" step="0.01" name="price" class="form-control" placeholder="Price" required>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-success w-100">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Menu List -->
    <div class="card shadow-sm p-4">
        <h4>Menu Items</h4>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="i : ${items}">
                <td th:text="${i.id}"></td>
                <td th:text="${i.name}"></td>
                <td class="text-success fw-semibold"
                    th:text="'₹ ' + ${i.price}">
                </td>
                <td>
                    <button class="btn btn-danger btn-sm delete-btn"
                            th:data-url="@{'/menu/delete/' + ${i.id}}">
                        Delete
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".delete-btn").forEach(button => {
            button.addEventListener("click", function () {
                const url = this.getAttribute("data-url");

                Swal.fire({
                    title: "Are you sure?",
                    text: "This action cannot be undone!",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonColor: "#d33",
                    cancelButtonColor: "#3085d6",
                    confirmButtonText: "Yes, delete it!"
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = url;
                    }
                });
            });
        });
    });
</script>
</body>
</html>
