<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Orders</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">QuickBite</a>

    <div>
      <a class="btn btn-outline-light me-2" href="/customers">Customers</a>
      <a class="btn btn-outline-light me-2" href="/menu">Menu</a>
      <a class="btn btn-warning" href="/orders">Orders</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <!-- Page Title -->
  <h2 class="text-center mb-4">🍔 QuickBite Orders</h2>

  <!-- Form Card -->
  <div class="card shadow-sm p-4 mb-5">
    <h4 class="mb-3">Create Order</h4>

    <form th:action="@{/orders}" method="post">

      <div class="row g-3">

        <!-- Customer -->
        <div class="col-md-4">
          <label class="form-label">Customer</label>
          <select class="form-select" name="customerId" required>
            <option value="">Select Customer</option>
            <option th:each="c : ${customers}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
          </select>
        </div>

        <!-- Food Item -->
        <div class="col-md-4">
          <label class="form-label">Food Item</label>
          <select class="form-select" id="foodItem" name="foodItemId" required>
            <option value="">Select Item</option>
            <option th:each="i : ${items}"
                    th:value="${i.id}"
                    th:text="${i.name}"
                    th:data-price="${i.price}">
            </option>
          </select>
        </div>

        <!-- Quantity -->
        <div class="col-md-4">
          <label class="form-label">Quantity</label>
          <input type="number" class="form-control"
                 id="quantity" name="quantity"
                 min="1" value="1" required />
        </div>

      </div>

      <!-- Total -->
      <div class="mt-4 text-end">
        <h5>Total: ₹ <span id="total" class="text-success fw-bold">0</span></h5>
      </div>

      <!-- Button -->
      <div class="mt-3 text-end">
        <button type="submit" class="btn btn-primary px-4">
          Place Order
        </button>
      </div>

    </form>
  </div>

  <!-- Orders Table -->
  <div class="card shadow-sm p-4">
    <h4 class="mb-3">Orders List</h4>

    <table class="table table-striped table-hover">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Item</th>
        <th>Quantity</th>
        <th>Total Price</th>
        <th>Action</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="o : ${orders}">
        <td th:text="${o.id}"></td>
        <td th:text="${o.customer.name}"></td>
        <td th:text="${o.foodItem.name}"></td>
        <td th:text="${o.quantity}"></td>
        <td class="text-success fw-semibold"
            th:text="'₹ ' + ${o.totalPrice}">
        </td>
        <td>
          <button class="btn btn-danger btn-sm delete-btn"
                  th:data-url="@{'/orders/delete/' + ${o.id}}">
            Delete
          </button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</div>

<!-- JS for Live Total -->
<script>
  const foodItem = document.getElementById("foodItem");
  const quantity = document.getElementById("quantity");
  const totalField = document.getElementById("total");

  function calculateTotal() {
      const selectedOption = foodItem.options[foodItem.selectedIndex];
      const price = selectedOption.getAttribute("data-price");
      const qty = quantity.value;

      if (price && qty) {
          const total = price * qty;
          totalField.innerText = total.toFixed(2);
      } else {
          totalField.innerText = "0";
      }
  }

  foodItem.addEventListener("change", calculateTotal);
  quantity.addEventListener("input", calculateTotal);
</script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll(".delete-btn").forEach(button => {
          button.addEventListener("click", function () {
              const url = this.getAttribute("data-url");

              Swal.fire({
                  title: "Are you sure?",
                  text: "This action cannot be undone!",
                  icon: "warning",
                  showCancelButton: true,
                  confirmButtonColor: "#d33",
                  cancelButtonColor: "#3085d6",
                  confirmButtonText: "Yes, delete it!"
              }).then((result) => {
                  if (result.isConfirmed) {
                      window.location.href = url;
                  }
              });
          });
      });
  });
</script>
</body>
</html>
